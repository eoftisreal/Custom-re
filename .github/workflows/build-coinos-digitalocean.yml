name: Build CoinOS for Samsung Galaxy J7 (j7xelte) — DigitalOcean

# Optimized for DigitalOcean Droplets (Ubuntu 22.04, 8+ vCPU, 16GB+ RAM, 200GB+ disk).
# Key differences from the GitHub-hosted-runner version (build-coinos.yml):
#   - No disk-space mitigation (maximize-build-space, package cleanup)
#   - repo sync runs with -j8 instead of -j2
#   - Build parallelism uses all available CPU cores
#   - ccache limit raised to 100GB
#   - Retry logic simplified to 2 attempts
#   - Artifacts uploaded to DigitalOcean Spaces (S3-compatible) as well as GitHub
#   - Optional email/Slack notifications on completion

on:
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Perform a clean build (make clean)'
        required: false
        type: boolean
        default: false
      notify_slack:
        description: 'Send Slack notification on completion'
        required: false
        type: boolean
        default: false
      notify_email:
        description: 'Send email notification on completion'
        required: false
        type: boolean
        default: false

jobs:
  preflight:
    name: Pre-flight checks
    runs-on: self-hosted
    outputs:
      repos_ok: ${{ steps.check_repos.outputs.repos_ok }}
    steps:
      - name: Check disk space
        run: |
          echo "=== Disk space on runner ==="
          df -h
          AVAIL_KB=$(df --output=avail / | tail -1)
          AVAIL_GB=$((AVAIL_KB / 1024 / 1024))
          echo "Available on /: ${AVAIL_GB} GB"
          if [ "${AVAIL_GB}" -lt 80 ]; then
            echo "WARNING: Less than 80GB free. Consider running cleanup-old-builds.sh first."
          fi

      - name: Check required dependencies
        run: |
          for cmd in git repo ccache curl xmllint java; do
            if ! command -v "${cmd}" >/dev/null 2>&1; then
              echo "ERROR: Required command not found: ${cmd}"
              echo "Run scripts/do-build-init.sh to install dependencies."
              exit 1
            fi
          done
          echo "All required commands are present."
          java -version
          git --version
          ccache --version | head -1

      - name: Verify repository accessibility
        id: check_repos
        env:
          REPO_NAME: ${{ github.repository }}
        run: |
          REPOS_OK=true
          for repo_url in \
            "https://github.com/${REPO_NAME}" \
            "https://github.com/eoftisreal/android_kernel_samsung_exynos7870" \
            "https://github.com/eoftisreal/android_vendor_samsung_j7xelte"; do
            HTTP_CODE=$(curl -sSL --retry 2 -o /dev/null -w "%{http_code}" "${repo_url}" || echo "000")
            if [ "${HTTP_CODE}" = "200" ]; then
              echo "  OK (HTTP ${HTTP_CODE}): ${repo_url}"
            else
              echo "  ERROR (HTTP ${HTTP_CODE}): ${repo_url}"
              REPOS_OK=false
            fi
          done
          echo "repos_ok=${REPOS_OK}" >> "$GITHUB_OUTPUT"
          if [ "${REPOS_OK}" != "true" ]; then
            echo "ERROR: One or more required repositories are not accessible. Aborting."
            exit 1
          fi

  build:
    name: Build CoinOS ROM
    runs-on: self-hosted
    needs: preflight
    timeout-minutes: 360
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      USE_CCACHE: "1"
      WORKSPACE_DIR: "/opt/coinos-build/workspace"
      BUILD_TIMESTAMP: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set build timestamp
        run: |
          TS=$(date -u +"%Y%m%d-%H%M%S")
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "BUILD_TIMESTAMP=${TS}-${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "Build ID: ${TS}-${SHORT_SHA}"

      - name: Show system resources
        run: |
          echo "=== CPU info ==="
          nproc --all
          lscpu | grep -E "^CPU\(s\)|^Model name|^Thread|^Core"
          echo "=== Memory ==="
          free -h
          echo "=== Disk ==="
          df -h

      - name: Install / update build dependencies
        run: |
          echo "Updating package lists..."
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache curl flex g++-multilib gcc-multilib git \
            gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev \
            liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libwxgtk3.0-gtk3-dev \
            libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
            python3 python-is-python3 openjdk-11-jdk s3cmd
          # Install repo tool if not already present
          if ! command -v repo >/dev/null 2>&1; then
            mkdir -p ~/bin
            curl -fL --retry 3 https://storage.googleapis.com/git-repo-downloads/repo -o ~/bin/repo
            chmod a+x ~/bin/repo
            echo "$HOME/bin" >> "$GITHUB_PATH"
          fi

      - name: Configure Git
        run: |
          git config --global user.name "DigitalOcean CI Build"
          git config --global user.email "action@github.com"
          git config --global color.ui false

      - name: Initialize repo and sync source
        env:
          REPO_TRACE: "0"
        run: |
          mkdir -p "${WORKSPACE_DIR}"
          cd "${WORKSPACE_DIR}"

          echo "=== Initializing repo manifest ==="
          repo init -u https://github.com/eoftisreal/android.git -b main --depth=1

          # Create local manifests directory and device manifest
          mkdir -p .repo/local_manifests
          REPO_NAME="${{ github.repository }}"
          REF_NAME="${{ github.ref_name }}"
          cat > .repo/local_manifests/j7xelte.xml << 'MANIFEST_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <project path="device/samsung/j7xelte" name="REPO_NAME_PLACEHOLDER" remote="github" revision="REF_NAME_PLACEHOLDER" />
            <project path="kernel/samsung/exynos7870" name="android_kernel_samsung_exynos7870" remote="github" revision="main" />
            <project path="vendor/samsung/j7xelte" name="android_vendor_samsung_j7xelte" remote="github" revision="main" />
          </manifest>
          MANIFEST_EOF

          sed -i "s|REPO_NAME_PLACEHOLDER|${REPO_NAME}|g" .repo/local_manifests/j7xelte.xml
          sed -i "s|REF_NAME_PLACEHOLDER|${REF_NAME}|g" .repo/local_manifests/j7xelte.xml

          echo "=== Validating local manifest XML ==="
          cat .repo/local_manifests/j7xelte.xml
          xmllint --noout .repo/local_manifests/j7xelte.xml || {
            echo "ERROR: Invalid local manifest XML"
            exit 1
          }

          # Sync with higher parallelism — DigitalOcean Droplets have more bandwidth
          # Simplified to 2 attempts (no aggressive disk-cleanup between retries needed)
          for attempt in 1 2; do
            echo "=== repo sync attempt ${attempt} of 2 ==="
            if repo sync -c -j8 --force-sync --no-clone-bundle --no-tags --optimized-fetch \
                2>&1 | tee /tmp/repo_sync.log; then
              echo "repo sync succeeded on attempt ${attempt}"
              break
            fi
            if [ "${attempt}" -eq 2 ]; then
              echo "ERROR: repo sync failed after 2 attempts"
              echo "=== Last 100 lines of sync log ==="
              tail -100 /tmp/repo_sync.log || true
              echo "=== Disk space at failure ==="
              df -h
              exit 1
            fi
            echo "repo sync failed on attempt ${attempt}, retrying in 30 seconds..."
            # Remove stale lock files before retrying
            find .repo -name "*.lock" -delete 2>/dev/null || true
            sleep 30
          done

      - name: Setup ccache
        run: |
          export CCACHE_DIR="${WORKSPACE_DIR}/.ccache"
          mkdir -p "${CCACHE_DIR}"
          # 100GB ccache — DigitalOcean Droplets have ample storage
          ccache -M 100G
          ccache --set-config=compression=true
          echo "CCACHE_DIR=${CCACHE_DIR}" >> "$GITHUB_ENV"
          ccache -s

      - name: Build ROM
        shell: bash
        run: |
          cd "${WORKSPACE_DIR}"

          if [ "${{ github.event.inputs.clean_build }}" = "true" ]; then
            echo "=== Performing clean build ==="
            make clean
          fi

          source build/envsetup.sh
          lunch coin_j7xelte-userdebug

          # Use all available CPU cores — DigitalOcean Droplets are dedicated VMs
          NPROC=$(nproc --all)
          MEM_GB=$(awk '/MemTotal/ {printf "%d", $2/1024/1024}' /proc/meminfo)
          # Allow roughly 1 job per 1.5 GB RAM to avoid OOM, capped at nproc
          MAX_BY_MEM=$(( (MEM_GB * 2) / 3 ))
          JOBS=$(( MAX_BY_MEM > NPROC ? NPROC : MAX_BY_MEM ))
          JOBS=$(( JOBS < 1 ? 1 : JOBS ))
          echo "Building with -j${JOBS} (CPUs: ${NPROC}, RAM: ${MEM_GB}GB)"

          # Start the build — timestamp marks when compilation started
          mka bacon -j${JOBS} 2>&1 | tee "${WORKSPACE_DIR}/out/build_${BUILD_TIMESTAMP}.log"

      - name: Print ccache stats
        if: always()
        run: ccache -s || true

      - name: Collect build artifacts
        if: success()
        run: |
          OUT_DIR="${WORKSPACE_DIR}/out/target/product/j7xelte"
          ls -lh "${OUT_DIR}"/CoinOS*.zip || true
          ls -lh "${OUT_DIR}"/recovery*.img || true

      - name: Upload ROM to GitHub Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: CoinOS-j7xelte-ROM-${{ env.BUILD_TIMESTAMP }}
          path: /opt/coinos-build/workspace/out/target/product/j7xelte/CoinOS*.zip
          if-no-files-found: error
          retention-days: 30

      - name: Upload ROM to DigitalOcean Spaces
        # Requires secrets: DO_SPACES_KEY, DO_SPACES_SECRET, DO_SPACES_BUCKET, DO_SPACES_REGION
        if: >
          success() &&
          secrets.DO_SPACES_KEY &&
          secrets.DO_SPACES_SECRET
        env:
          DO_SPACES_KEY: ${{ secrets.DO_SPACES_KEY }}
          DO_SPACES_SECRET: ${{ secrets.DO_SPACES_SECRET }}
          DO_SPACES_BUCKET: ${{ secrets.DO_SPACES_BUCKET }}
          DO_SPACES_REGION: ${{ secrets.DO_SPACES_REGION }}
        run: |
          OUT_DIR="${WORKSPACE_DIR}/out/target/product/j7xelte"
          REGION="${DO_SPACES_REGION:-nyc3}"
          BUCKET="${DO_SPACES_BUCKET:-coinos-builds}"
          DEST_PREFIX="s3://${BUCKET}/coinos-builds/${BUILD_TIMESTAMP}"

          # Write s3cmd config from secrets into the runner's temp directory
          # (automatically cleaned up by the runner after the job completes)
          S3CFG="${RUNNER_TEMP}/s3cfg_do_$$"
          cat > "${S3CFG}" << EOF
          [default]
          access_key = ${DO_SPACES_KEY}
          secret_key = ${DO_SPACES_SECRET}
          host_base = ${REGION}.digitaloceanspaces.com
          host_bucket = %(bucket)s.${REGION}.digitaloceanspaces.com
          use_https = True
          EOF

          echo "Uploading build artifacts to DigitalOcean Spaces (${BUCKET})..."
          for f in "${OUT_DIR}"/CoinOS*.zip; do
            [ -f "${f}" ] || continue
            echo "  Uploading: $(basename "${f}")"
            s3cmd --config="${S3CFG}" put "${f}" "${DEST_PREFIX}/$(basename "${f}")"
          done
          rm -f "${S3CFG}"
          echo "Upload complete: ${DEST_PREFIX}/"

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ env.BUILD_TIMESTAMP }}
          path: |
            /opt/coinos-build/workspace/out/build_*.log
            /opt/coinos-build/workspace/out/verbose.log.gz
            /opt/coinos-build/workspace/out/error.log
            /tmp/repo_sync.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Notify Slack on completion
        if: >
          always() &&
          github.event.inputs.notify_slack == 'true' &&
          secrets.SLACK_WEBHOOK_URL
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
        run: |
          COLOR="good"
          ICON=":white_check_mark:"
          if [ "${JOB_STATUS}" != "success" ]; then
            COLOR="danger"
            ICON=":x:"
          fi
          curl -fsSL -X POST "${SLACK_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "{
              \"attachments\": [{
                \"color\": \"${COLOR}\",
                \"title\": \"${ICON} CoinOS Build ${JOB_STATUS^}\",
                \"text\": \"Build ID: \`${BUILD_TIMESTAMP}\`\nRepo: \`${{ github.repository }}\`\nBranch: \`${{ github.ref_name }}\`\nTriggered by: ${{ github.actor }}\",
                \"footer\": \"DigitalOcean CI\",
                \"ts\": $(date +%s)
              }]
            }"

      - name: Notify email on completion
        if: >
          always() &&
          github.event.inputs.notify_email == 'true' &&
          secrets.NOTIFY_EMAIL &&
          secrets.SENDGRID_API_KEY
        env:
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          JOB_STATUS: ${{ job.status }}
        run: |
          curl -fsSL -X POST https://api.sendgrid.com/v3/mail/send \
            -H "Authorization: Bearer ${SENDGRID_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"personalizations\": [{\"to\": [{\"email\": \"${NOTIFY_EMAIL}\"}]}],
              \"from\": {\"email\": \"ci@coinos-build.local\", \"name\": \"CoinOS CI\"},
              \"subject\": \"CoinOS Build ${JOB_STATUS^} — ${BUILD_TIMESTAMP}\",
              \"content\": [{
                \"type\": \"text/plain\",
                \"value\": \"Build ID: ${BUILD_TIMESTAMP}\nStatus: ${JOB_STATUS}\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nTriggered by: ${{ github.actor }}\n\nView run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
              }]
            }"
